server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # HPOGraph fetches data/hpo.db.gz's raw bytes itself and decompresses
    # them client-side with the DecompressionStream API (see
    # assets/js/db.js) -- this is how it stays under static-host file-size
    # limits without a server-side gzip negotiation. If nginx's own gzip
    # module also compressed that response on the fly, the browser would
    # transparently auto-decompress it in transit, and the app's own
    # decompression step would then fail trying to gunzip already-plain
    # bytes. Disabling gzip entirely is the simplest way to guarantee that
    # never happens -- this site is small enough that dynamic compression
    # of the HTML/CSS/JS wouldn't meaningfully help anyway.
    gzip off;

    location / {
        try_files $uri $uri/ =404;
    }
}
